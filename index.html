<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Granja Don Ortiz | En desarrollo</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1f3d1f,#2e7d32);
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  text-align:center;
}

.container{
  padding:40px;
  border-radius:20px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(0,0,0,0.4);
}

h1{
  font-size:2rem;
  margin-bottom:10px;
}

p{
  opacity:0.9;
  font-size:1.1rem;
}

.dot{
  animation:blink 1.5s infinite;
}

@keyframes blink{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}
</style>
</head>
<body>

<div class="container">
  <h1>Granja Don Ortiz</h1>
  <p>Sitio web en desarrollo<span class="dot">...</span></p>
  <p>Próximamente más información.</p>
</div>

</body>
</html>
